<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Smart File Organizer{% endblock %}</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background-color: #f0f2f5; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .card-header { border-radius: 12px 12px 0 0 !important; }
    .badge-category { font-size: .75rem; }
    .file-row:hover { background-color: #f8f9fa; }
    .upload-zone { border: 2px dashed #6c757d; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: border-color .2s; }
    .upload-zone:hover { border-color: #0d6efd; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">
      <i class="bi bi-folder2-open me-2"></i>Smart File Organizer
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      {% if user.is_authenticated %}
        <span class="text-white-50 small">Hi, <strong class="text-white">{{ user.username }}</strong></span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
      {% else %}
        <a href="{% url 'login' %}"  class="btn btn-outline-light btn-sm">Login</a>
        <a href="{% url 'signup' %}" class="btn btn-light btn-sm">Sign Up</a>
      {% endif %}
    </div>
  </div>
</nav>

<!-- Flash messages -->
<div class="container mt-3">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
</div>

<!-- Page content -->
<div class="container my-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
