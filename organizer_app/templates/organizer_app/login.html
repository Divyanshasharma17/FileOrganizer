{% extends "organizer_app/base.html" %}
{% block title %}Login — Smart File Organizer{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card">
      <div class="card-header bg-primary text-white text-center">
        <i class="bi bi-lock me-2"></i>Login
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label small fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Login
          </button>
        </form>
        <hr />
        <p class="text-center small mb-0">
          Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
